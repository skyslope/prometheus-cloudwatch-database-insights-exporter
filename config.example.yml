# Example configuration for Amazon CloudWatch Database Insights Exporter
# This file demonstrates tag-based instance filtering

discovery:
  regions:
    - us-west-2
  
  instances:
    max-instances: 25
    cache:
      ttl: "5m"
    
    # Include instances based on field patterns
    include:
      identifier:
        - "^prod-"
        - "^staging-"
      engine:
        - "postgres"
        - "mysql"
      
      # Tag-based filtering: Include instances with specific tags
      # All tag filters must match (AND logic)
      tag.Environment:
        - "^production$"
        - "^staging$"
      tag.Team:
        - "back"
        - "again"
    
    # Exclude instances based on field patterns
    exclude:
      identifier:
        - "test"
        - "temp"
      
      # Tag-based filtering: Exclude instances with specific tags
      # Any tag filter match will exclude (OR logic)
      tag.Status:
        - "deprecated"
        - "decommissioned"
      tag.Maintenance:
        - "true"
  
  metrics:
    statistic: "avg"    
    include:
      category:
        - "os"
        - "db"
      name:
        - "cpu"
        - "memory"
    
    exclude:
      name:
        - "test"

    cache:
      metric-metadata-ttl: "60m"    # How long to cache metric definitions per instance
      metric-data:
        max-size: 100000            # Maximum number of metric values to cache
        # Optional: Pattern-based TTL overrides for specific metrics
        # Patterns match against metric names: <metric-name-with-statistic>
        # Examples: "db.load.avg", "os.memory.total.avg"
        # If pattern TTL is smaller than the metric's data interval (dynamic TTL),
        # the dynamic TTL will be used instead to respect the actual metric granularity.
        # If no pattern matches, TTL is calculated dynamically from metric collection interval
        pattern-ttls:
          - pattern: "^db\\.load\\..*"        # Match db.load metrics (any statistic)
            ttl: "30s"
          - pattern: "^os\\.memory\\..*"      # Match os.memory metrics (any statistic)
            ttl: "5m"
  
  processing:
    concurrency: 4

export:
  port: 8081
  prometheus:
    metric-prefix: "dbi"
